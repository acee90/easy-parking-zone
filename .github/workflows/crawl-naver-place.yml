name: Crawl Naver Place Reviews

on:
  schedule:
    - cron: '0 18 * * 0' # 매주 일요일 03:00 KST (18:00 UTC 토요일)
  workflow_dispatch: # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - uses: microsoft/playwright-github-action@v1

      - run: bunx playwright install chromium

      - name: Run Naver Place crawler
        run: bun run scripts/crawl-naver-place.ts --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload progress artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naver-place-progress
          path: scripts/naver-place-progress.json
          retention-days: 30
